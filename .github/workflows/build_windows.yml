name: Build Windows binaries

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: x86_64
            artifact-suffix: x64
          - arch: i686
            artifact-suffix: x86

    steps:
    - uses: actions/checkout@v4

    - name: Install MinGW-w64 cross-compiler and build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 autoconf automake libtool make

    - name: Build libusb from source
      run: |
        LIBUSB_VERSION=1.0.27
        wget https://github.com/libusb/libusb/releases/download/v${LIBUSB_VERSION}/libusb-${LIBUSB_VERSION}.tar.bz2 -O libusb.tar.bz2
        tar -xjf libusb.tar.bz2
        cd libusb-${LIBUSB_VERSION}
        if [ "${{ matrix.arch }}" = "x86_64" ]; then
          HOST=x86_64-w64-mingw32
        else
          HOST=i686-w64-mingw32
        fi
        ./configure --host=${HOST} --prefix=/usr/${HOST} --disable-shared --enable-static
        make -j$(nproc)
        sudo make install
        cd ..

    - name: Build zlib from source
      run: |
        ZLIB_VERSION=1.3.2
        wget https://github.com/madler/zlib/archive/refs/tags/v${ZLIB_VERSION}.tar.gz -O zlib.tar.gz
        tar -xzf zlib.tar.gz
        cd zlib-${ZLIB_VERSION}
        if [ "${{ matrix.arch }}" = "x86_64" ]; then
          export CC=x86_64-w64-mingw32-gcc
          HOST=x86_64-w64-mingw32
        else
          export CC=i686-w64-mingw32-gcc
          HOST=i686-w64-mingw32
        fi
        ./configure --prefix=/usr/${HOST} --static
        make -j$(nproc)
        sudo make install
        cd ..

    - name: Build libfdt from source
      run: |
        DTC_VERSION=1.7.0
        wget https://github.com/dgibson/dtc/archive/refs/tags/v${DTC_VERSION}.tar.gz -O dtc.tar.gz
        tar -xzf dtc.tar.gz
        cd dtc-${DTC_VERSION}
        if [ "${{ matrix.arch }}" = "x86_64" ]; then
          export CC=x86_64-w64-mingw32-gcc
          export AR=x86_64-w64-mingw32-ar
          export PREFIX=/usr/x86_64-w64-mingw32
        else
          export CC=i686-w64-mingw32-gcc
          export AR=i686-w64-mingw32-ar
          export PREFIX=/usr/i686-w64-mingw32
        fi
        make -j$(nproc) NO_PYTHON=1 NO_YAML=1 libfdt
        sudo mkdir -p $PREFIX/include
        sudo mkdir -p $PREFIX/lib
        sudo cp libfdt/libfdt.h $PREFIX/include/
        sudo cp libfdt/libfdt_env.h $PREFIX/include/
        sudo cp libfdt/libfdt.a $PREFIX/lib/
        cd ..

    - name: Build sunxi-fel for Windows
      run: |
        if [ "${{ matrix.arch }}" = "x86_64" ]; then
          export CC=x86_64-w64-mingw32-gcc
          export PREFIX=/usr/x86_64-w64-mingw32
          EXE=sunxi-fel-${{ matrix.artifact-suffix }}.exe
        else
          export CC=i686-w64-mingw32-gcc
          export PREFIX=/usr/i686-w64-mingw32
          EXE=sunxi-fel-${{ matrix.artifact-suffix }}.exe
        fi
        export LIBUSB_CFLAGS="-I$PREFIX/include/libusb-1.0"
        export LIBUSB_LIBS="-L$PREFIX/lib -lusb-1.0"
        export ZLIB_CFLAGS="-I$PREFIX/include"
        export ZLIB_LIBS="-L$PREFIX/lib -lz"
        export LIBFDT_CFLAGS="-I$PREFIX/include"
        export LIBFDT_LIBS="-L$PREFIX/lib -lfdt"
        export LIBS="-lws2_32"
        export OS=Windows_NT
        make clean
        make sunxi-fel
        mv sunxi-fel $EXE

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sunxi-fel-windows-${{ matrix.artifact-suffix }}
        path: |
          sunxi-fel-*.exe

  release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: sunxi-fel-windows-*
        path: artifacts
        merge-multiple: true

    - name: Create ZIP packages
      run: |
        mkdir -p release
        cd artifacts
        zip -r ../release/sunxi-fel-windows.zip sunxi-fel-*.exe

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/sunxi-fel-windows.zip
